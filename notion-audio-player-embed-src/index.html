<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mini-player">
  <div class="audio-player">
    <div class="card">
      <div class="top-wrapper">
        <img id="cover" src="" alt="Album Art">
      </div>

      <div class="player-content">
        <div class="info">
          <h3 id="title">Caricamento...</h3>
          <p id="artist">...</p>
        </div>

        <div class="progress-container">
          <div class="times">
            <span id="current">0:00</span>
            <span id="total">1:34</span>
          </div>

          <div class="rc-slider" id="progress-area">
            <div class="rc-slider-rail" style="background-color: rgb(48, 48, 46);"></div>
            <div class="rc-slider-track" id="fill" style="background-color: rgb(229, 100, 88); left: 0%; width: 0%;"></div>
            <div id="handle" class="rc-slider-handle" style="background-color: rgb(229, 100, 88); left: 0%;"></div>
          </div>
        </div>

        <div class="controls">
          <div class="main-controls">
            <button id="prev">
              <svg stroke="currentColor" fill="currentColor" viewBox="0 0 512 512"><path d="M30.71 229.47l188.87-113a30.54 30.54 0 0131.09-.39 33.74 33.74 0 0116.76 29.47v79.05l180.72-108.16a30.54 30.54 0 0131.09-.39A33.74 33.74 0 01496 145.52v221A33.73 33.73 0 01479.24 396a30.54 30.54 0 01-31.09-.39L267.43 287.4v79.08A33.73 33.73 0 01250.67 396a30.54 30.54 0 01-31.09-.39l-188.87-113a31.27 31.27 0 010-53z"></path></svg>
            </button> 
            <button id="play" class="play-btn">
              <svg stroke="currentColor" fill="currentColor" viewBox="0 0 448 512"><path d="M424.4 214.7L72.4 6.6C43.8-10.3 0 6.1 0 47.9V464c0 37.5 40.7 60.1 72.4 41.3l352-208c31.4-18.5 31.5-64.1 0-82.6z"></path></svg>
            </button>
            <button id="next">
              <svg stroke="currentColor" fill="currentColor" viewBox="0 0 512 512"><path d="M481.29 229.47l-188.87-113a30.54 30.54 0 00-31.09-.39 33.74 33.74 0 00-16.76 29.47v79.05L63.85 116.44a30.54 30.54 0 00-31.09-.39A33.74 33.74 0 0016 145.52v221A33.74 33.74 0 0032.76 396a30.54 30.54 0 0031.09-.39L244.57 287.4v79.08A33.74 33.74 0 00261.33 396a30.54 30.54 0 0031.09-.39l188.87-113a31.27 31.27 0 000-53z"></path></svg>
            </button>
          </div>
          
          <div class="extra-controls">
            <div class="volume-container">
              <button id="volume-btn" class="audio-player-extras">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="24px" width="24px"><path d="M264 416.19a23.92 23.92 0 01-14.21-4.69l-.66-.51-91.46-75H88a24 24 0 01-24-24V200a24 24 0 0124-24h69.65l91.46-75 .66-.51A24 24 0 01288 119.83v272.34a24 24 0 01-24 24zM352 336a16 16 0 01-14.29-23.18c9.49-18.9 14.3-38 14.3-56.82 0-19.36-4.66-37.92-14.25-56.73a16 16 0 0128.5-14.54C378.2 208.16 384 231.47 384 256c0 23.83-6 47.78-17.7 71.18A16 16 0 01352 336z"></path><path d="M400 384a16 16 0 01-13.87-24C405 327.05 416 299.45 416 256c0-44.12-10.94-71.52-29.83-103.95A16 16 0 01413.83 136C434.92 172.16 448 204.88 448 256c0 50.36-13.06 83.24-34.12 120a16 16 0 01-13.88 8z"></path></svg>
              </button>
              <input type="range" id="volume-slider" max="1" min="0" step="0.01" value="0.3">
            </div>

            <button id="shuffle" class="audio-player-extras" title="Shuffle">
              <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="24px" width="24px"><path d="M17,17h-1.559l-9.7-10.673C5.552,6.119,5.283,6,5.001,6H2v2h2.559l4.09,4.5l-4.09,4.501H2v2h3.001 c0.282,0,0.551-0.119,0.74-0.327L10,13.987l4.259,4.686C14.448,18.881,14.717,19,14.999,19H17v3l5-4l-5-4V17z"></path><path d="M15.441,8H17v3l5-3.938L17,3v3h-2.001c-0.282,0-0.551,0.119-0.74,0.327l-3.368,3.707l1.48,1.346L15.441,8z"></path></svg>
            </button>

            <button id="repeat" class="audio-player-extras" title="Repeat">
              <svg viewBox="0 0 71 68" fill="currentColor" width="24px" height="24px"><path d="M46.6117 17.8869L48.5 16L48.5 9L46.6117 7.12437C45.782 6.34172 45.3159 5.28021 45.3159 4.17336C45.3159 3.06652 45.782 2.00501 46.6117 1.22235C47.4414 0.439693 48.5667 0 49.74 0C50.9133 0 52.0386 0.439693 52.8683 1.22235L61.7011 9.55462C62.1128 9.94167 62.4395 10.4016 62.6624 10.908C62.8853 11.4144 63 11.9573 63 12.5056C63 13.054 62.8853 13.5969 62.6624 14.1033C62.4395 14.6097 62.1128 15.0696 61.7011 15.4566L52.8683 23.7889C52.0349 24.5649 50.911 25 49.74 25C48.569 25 47.4451 24.5649 46.6117 23.7889C46.2 23.4019 45.8733 22.9419 45.6504 22.4355C45.4275 21.9291 45.3127 21.3862 45.3127 20.8379C45.3127 20.2896 45.4275 19.7466 45.6504 19.2402C45.8733 18.7338 46.2 18.2739 46.6117 17.8869Z"></path><path d="M24.3883 50.1131L22.5 52L22.5 59L24.3883 60.8756C25.218 61.6583 25.6841 62.7198 25.6841 63.8266C25.6841 64.9335 25.218 65.995 24.3883 66.7777C23.5586 67.5603 22.4333 68 21.26 68C20.0867 68 18.9614 67.5603 18.1317 66.7776L9.29893 58.4454C8.88721 58.0583 8.56053 57.5984 8.33762 57.092C8.11472 56.5856 7.99998 56.0427 7.99998 55.4944C7.99998 54.946 8.11472 54.4031 8.33762 53.8967C8.56053 53.3903 8.88721 52.9304 9.29893 52.5434L18.1317 44.2111C18.9651 43.4351 20.089 43 21.26 43C22.431 43 23.5549 43.4351 24.3883 44.2111C24.8 44.5981 25.1267 45.0581 25.3496 45.5645C25.5725 46.0709 25.6873 46.6138 25.6873 47.1621C25.6873 47.7104 25.5725 48.2534 25.3496 48.7598C25.1267 49.2662 24.8 49.7261 24.3883 50.1131Z"></path><path fill-rule="evenodd" clip-rule="evenodd" d="M57 12.5382C57 10.5841 55.4051 9 53.4375 9H21.375C9.56991 9 0 18.5046 0 30.2291C0 33.3143 0.66487 36.2546 1.86347 38.9089C2.6686 40.6918 4.77664 41.4889 6.57185 40.6893C8.3671 39.8897 9.16973 37.7962 8.36457 36.0133C7.56921 34.2516 7.125 32.2968 7.125 30.2291C7.125 22.4127 13.5049 16.0764 21.375 16.0764H53.4375C55.4051 16.0764 57 14.4922 57 12.5382Z"></path><path fill-rule="evenodd" clip-rule="evenodd" d="M14 55.3513C14 57.3665 15.595 59 17.5625 59H49.625C61.4301 59 71 49.1984 71 37.1076C71 33.9259 70.3352 30.8938 69.1365 28.1565C68.3313 26.3179 66.2234 25.4957 64.4283 26.3204C62.6328 27.145 61.8301 29.304 62.6353 31.1426C63.4308 32.9593 63.875 34.9752 63.875 37.1076C63.875 45.168 57.4949 51.7025 49.625 51.7025H17.5625C15.595 51.7025 14 53.3361 14 55.3513Z"></path></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
